# RBAC superusers override for the portal.
#
# IMPORTANT (verified against the RBAC backend shipped with portal 2.2 /
# RHDH 1.9, @backstage-community/plugin-rbac-backend 7.6.2):
# `superUsers` entries are matched against the INDIVIDUAL user entity ref only.
# A `group:` entry (e.g. group:default/aap-admins) is NOT expanded to its
# members — group members will NOT get the superuser bypass and will see a 404
# after login until they are listed individually here or granted an RBAC role.
# Newer upstream versions of the RBAC plugin add group expansion; until that
# ships, list each administrator as a user: entry.
#
# Helm replaces lists wholesale — always provide the FULL list, including
# user:default/admin.
redhat-developer-hub:
  upstream:
    backstage:
      appConfig:
        permission:
          rbac:
            admin:
              superUsers:
                - name: 'user:default/admin'
                # Add each portal administrator individually:
                # - name: 'user:default/<username>'
                - name: 'group:default/aap-admins'  # kept for forward-compat; inert today
